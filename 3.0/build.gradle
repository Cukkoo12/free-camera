    group = 'verification'
    description = 'Runs deterministic Free Camera movement checks across supported frame rates.'
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.cukkoo.freecamera.motion.CameraMotionIntegratorDevelopmentChecks'
