tasks.register('verifyCameraCollision', JavaExec) {
    group = 'verification'
    description = 'Runs deterministic Free, Orbit, Tripod, recovery, and collision safety checks.'
    dependsOn tasks.named('testClasses')
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.cukkoo.freecamera.collision.CameraCollisionDevelopmentChecks'
    doFirst {
        def collisionRoot = file('src/main/java/com/cukkoo/freecamera/collision')
        def requiredFiles = [
                'CameraCollisionMode.java',
                'CameraCollisionState.java',
                'CameraCollisionResolver.java',
                'FreeCameraCollisionResolver.java',
                'OrbitCameraCollisionResolver.java',
                'CameraCollisionSmoother.java',
                'MinecraftCameraCollisionQuery.java'
        ]
        requiredFiles.each { name ->
            if (!new File(collisionRoot, name).isFile()) {
                throw new GradleException("Missing collision system: ${name}")
            }
        }
        def minecraftQuery = new File(collisionRoot, 'MinecraftCameraCollisionQuery.java')
                .getText('UTF-8')
        if (!minecraftQuery.contains('getChunkNow(')
                || !minecraftQuery.contains('getBlockCollisions(null, sweep)')
                || !minecraftQuery.contains('Shapes.collide(')
                || !minecraftQuery.contains('ClipContext.Block.COLLIDER')
                || !minecraftQuery.contains('ClipContext.Fluid.NONE')) {
            throw new GradleException('Collision must use loaded chunks, block shapes, and fluid-free Orbit clips')
        }
        def renderBridge = file('src/main/java/com/cukkoo/freecamera/render/CameraRenderBridge.java')
                .getText('UTF-8')
        def cameraMixin = file('src/main/java/com/cukkoo/freecamera/mixin/CameraMixin.java')
                .getText('UTF-8')
        def session = file('src/main/java/com/cukkoo/freecamera/state/CameraSession.java')
                .getText('UTF-8')
        def invalidationMixin = file(
                'src/main/java/com/cukkoo/freecamera/mixin/ClientLevelCollisionInvalidationMixin.java'
        ).getText('UTF-8')
        def mixinConfig = file('src/main/resources/free-camera.mixins.json').getText('UTF-8')
        if (!renderBridge.contains('collisionResolver.resolve(')
                || !renderBridge.contains('return session.renderedPose()')
                || !session.contains('desiredPose')
                || !session.contains('renderedPose')
                || cameraMixin.contains('CameraCollision')
                || !invalidationMixin.contains('method = "sendBlockUpdated"')
                || !invalidationMixin.contains('markCollisionWorldDirty()')
                || !mixinConfig.contains('"ClientLevelCollisionInvalidationMixin"')) {
            throw new GradleException('Collision must resolve before the render camera and remain outside Mixins')
        }
        fileTree(collisionRoot).matching { include '**/*.java' }.each { sourceFile ->
            def source = sourceFile.getText('UTF-8')
            if (source.contains('LocalPlayer.noPhysics')
                    || source.contains('.setDeltaMovement(')
                    || source.contains('Connection.send(')
                    || source.contains('Serverbound')
                    || source.contains('Clientbound')) {
                throw new GradleException("Collision touched player physics or networking: ${sourceFile}")
            }
        }
    }
}

