tasks.register('verifyFollowCamera', JavaExec) {
    group='verification'; dependsOn tasks.named('testClasses'); classpath=sourceSets.test.runtimeClasspath
    mainClass='com.cukkoo.freecamera.follow.FollowDevelopmentChecks'
    doFirst {
        def rig=file('src/main/java/com/cukkoo/freecamera/follow/FollowCameraRig.java').getText('UTF-8')
        def tracker=file('src/main/java/com/cukkoo/freecamera/follow/FollowTargetTracker.java').getText('UTF-8')
        def profileMath=file('src/main/java/com/cukkoo/freecamera/follow/FollowProfileMath.java').getText('UTF-8')
        ['FollowProfile.LOOK_AT','getGameTimeDeltaPartialTick(false)','getPosition(partialTick)','getBbHeight() * 0.5','TARGET_DISCONTINUITY_SQUARED','pose.translate(dx, dy, dz)','moveCameraRelative(','switchProfilePreservingPose'].each{if(!rig.contains(it))throw new GradleException("Follow refinement missing: ${it}")}
        ['case CHASE','case SIDE','case FIXED_ANGLE','LOOK_AT has no target-relative bearing'].each{if(!profileMath.contains(it))throw new GradleException("Distinct Follow profile math missing: ${it}")}
        ['instanceof Player','instanceof LivingEntity','instanceof AbstractBoat','instanceof AbstractMinecart','instanceof ArmorStand','entity.isVehicle()','Math.clamp(range,8,256)','getEntities((Entity) null, searchBounds'].each{if(!tracker.contains(it))throw new GradleException("Follow target/filter requirement missing: ${it}")}
        def machine=file('src/main/java/com/cukkoo/freecamera/state/CameraStateMachine.java').getText('UTF-8')
        if(!machine.contains('handleLostFollowTarget')||!machine.contains('CameraMode.FREE_CAMERA'))throw new GradleException('Follow target-loss pose-preserving fallback missing')
    }
}

tasks.register('verifyRuntimeHotfixes', JavaExec) {
    group='verification'; dependsOn tasks.named('testClasses'); classpath=sourceSets.test.runtimeClasspath
    mainClass='com.cukkoo.freecamera.follow.RuntimeHotfixDevelopmentChecks'
    doFirst {
        def screen=file('src/main/java/com/cukkoo/freecamera/gui/CameraSettingsScreen.java').getText('UTF-8')
        ['extractBackground(','SECTION_STARTS','controlLeft','controlWidth','visibleLabels','panelBottom-31','humanName(','narrowLayout'].each{if(!screen.contains(it))throw new GradleException("Polished settings layout missing: ${it}")}
        def keys=file('src/main/java/com/cukkoo/freecamera/input/CameraKeyMappings.java').getText('UTF-8')
        if(!keys.contains('if (!rollController.resetToZeroIfNeeded())')||!keys.contains('stateMachine.resetToPlayer(client);'))throw new GradleException('Two-stage reset decision is not wired')
        def machine=file('src/main/java/com/cukkoo/freecamera/state/CameraStateMachine.java').getText('UTF-8')
        if(!machine.contains('session.mode() == CameraMode.TRIPOD')||!machine.contains('tripodRig.enterFromPose(session.pose())'))throw new GradleException('Tripod second reset does not recapture the player pose')
        def mixin=file('src/main/java/com/cukkoo/freecamera/mixin/CameraMixin.java').getText('UTF-8')
        if(!mixin.contains('method = "calculateFov(F)F"')||!mixin.contains('DetachedCameraFov.select('))throw new GradleException('Detached dynamic FOV interception is missing')
        def client=file('src/main/java/com/cukkoo/freecamera/FreeCameraClient.java').getText('UTF-8')
        if(!client.contains('switchProfilePreservingPose(c.followProfile,active.renderedPose())'))throw new GradleException('Follow profile Apply/Done live wiring is missing')
        def rig=file('src/main/java/com/cukkoo/freecamera/follow/FollowCameraRig.java').getText('UTF-8')
        ['distanceDelta(','bearingDelta(','settleSemanticBearing','getPreciseBodyRotation(','state.profile() == FollowProfile.LOOK_AT'].each{if(!rig.contains(it))throw new GradleException("Follow runtime hotfix missing: ${it}")}
    }
}

tasks.register('verifyCompletionRequirements') {
    group='verification'
    doLast {
        def screen=file('src/main/java/com/cukkoo/freecamera/gui/CameraSettingsScreen.java').getText('UTF-8')
        ['Preferred Camera Mode','Radial Hold (ms)','Custom Speed','Follow Profile','Current Target:','Hide Hand','Start Recording','Play Selected','New Path','Add Current Pose','Collision Safety Margin','Restore Advanced Defaults','Confirm Preset'].each { label ->
            if(!screen.contains(label))throw new GradleException("Missing functional settings control: ${label}")
        }
        ['private boolean apply()','private void cancel()','resetTab()','mouseScrolled(','setTooltip(','EditBox','CONFIRM DELETE','listMetadata(','loadAndPlayRecording','replaceKeyframe','moveKeyframe'].each { token ->
            if(!screen.contains(token))throw new GradleException("Incomplete settings workflow: ${token}")
        }
        def production=fileTree('src/main/java').matching{include '**/*.java'}.collect{it.getText('UTF-8')}.join('\n').toLowerCase()
        ['todo','fixme','not implemented','unsupportedoperationexception','placeholder'].each{if(production.contains(it))throw new GradleException("Incomplete production marker remains: ${it}")}
        def metadata=file('src/main/resources/fabric.mod.json').getText('UTF-8')
        if(metadata.contains('"modmenu"') && metadata.contains('"depends"') && metadata.substring(metadata.indexOf('"depends"')).contains('modmenu'))throw new GradleException('Mod Menu became required')
        def buildScript=file('build.gradle').getText('UTF-8'),integration=file('src/main/java/com/cukkoo/freecamera/integration/FreeCameraModMenuIntegration.java').getText('UTF-8'),keys=file('src/main/java/com/cukkoo/freecamera/input/CameraKeyMappings.java').getText('UTF-8')
        if(!buildScript.contains('compileOnly "com.terraformersmc:modmenu:18.0.0"')||!integration.contains('FreeCameraClient.createSettingsScreen(parent)')||!keys.contains('GLFW.GLFW_KEY_F10')||!keys.contains('FreeCameraClient.openSettingsScreen()'))throw new GradleException('Optional Mod Menu or F10 shared-screen integration is incomplete')
        def render=file('src/main/java/com/cukkoo/freecamera/render/CameraRenderBridge.java').getText('UTF-8')
        if(!render.contains('if (!config.config().playbackCollision)')||!render.contains('collisionResolver.resolvePlayback('))throw new GradleException('Playback collision OFF/ON routing is incomplete')
    }
}

